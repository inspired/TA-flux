# -----------------------------------------------------------------------------
# flux_internal_dest_filter
#
# Site-specific scoping macro. EDIT THIS POST-INSTALL to restrict classification
# to your internal hosts only. Default ships permissive (matches everything).
#
# Example replacements:
#
#   IP-based:
#     where cidrmatch("10.0.0.0/8", dest)
#        OR cidrmatch("172.16.0.0/12", dest)
#        OR cidrmatch("192.168.0.0/16", dest)
#
#   Hostname-based:
#     where match(dest, "\.crimsonia\.net$")
#
[flux_internal_dest_filter]
definition = where 1=1
iseval = 0

# -----------------------------------------------------------------------------
# flux_model_name
#
# Single source of truth for the MLTK model name. Used as
#   | fit ... into `flux_model_name`
#   | apply `flux_model_name`
#
[flux_model_name]
definition = flux_asset_classifier
iseval = 0

# -----------------------------------------------------------------------------
# flux_combined_features(earliest_arg, latest_arg)
#
# Produces one row per dest with port_* and svc_* binary features (1 if the
# port or service was observed in the window). Combines two sources via
# multisearch:
#
#   1. Network_Traffic CIM data model (firewall traffic) — port_* features.
#      dest_ip is exposed as `ip` and normalized so flux_internal_dest_filter
#      can do CIDR matches on it; ip is dropped after the filter and re-emitted
#      via `values(ip)` only as a row attribute (not a feature).
#   2. odin_discovery service events — svc_* features. Includes services where
#      the latest observation in the window had service_status="running" OR
#      service_enabled="enabled".
#
# Both branches share the same key columns (dest, ip, dest_port, service_name)
# with empty strings in fields not relevant to the branch — required for the
# multisearch + stats merge to behave consistently.
#
# Unrecognized ports/services (not in odin_classify_ports / odin_classify_services)
# are silently dropped — the lookup acts as both a category enricher and a
# whitelist.
#
# Args:
#   earliest_arg - relative or absolute time, e.g. -30d@d
#   latest_arg   - relative or absolute time, e.g. now
#
[flux_combined_features(2)]
args = earliest_arg, latest_arg
definition = multisearch \
    [ \
    | tstats prestats=t summariesonly=true count \
          from datamodel=Network_Traffic.All_Traffic \
          where earliest=$earliest_arg$ latest=$latest_arg$ \
          by All_Traffic.dest, All_Traffic.dest_ip, All_Traffic.dest_port \
    | rename All_Traffic.dest as dest All_Traffic.dest_ip as ip All_Traffic.dest_port as dest_port \
    | normalizeip ip \
    | `flux_internal_dest_filter` \
    | lookup odin_classify_ports port as dest_port OUTPUT category \
    | where isnotnull(category) \
    | eval service_name="" \
    ] \
    [ \
    search earliest=$earliest_arg$ latest=$latest_arg$ index=odin_discovery sourcetype=odin:enumeration type=service \
    | rename hostname as dest \
    | `flux_internal_dest_filter` \
    | where service_status="running" OR service_enabled="enabled" \
    | lookup odin_classify_services service_pattern as service_name OUTPUT category \
    | where isnotnull(category) \
    | eval ip="", dest_port="" \
    ] \
| stats max(*) AS * BY dest ip dest_port service_name \
| eval dest_port_clean = replace(dest_port, "[^a-zA-Z0-9]", "_") \
| eval port_{dest_port_clean} = 1 \
| eval service_name_clean = replace(service_name, "[^a-zA-Z0-9]", "_") \
| eval svc_{service_name_clean} = 1 \
| fields port_* svc_* dest ip \
| fields - port_, svc_ \
| stats max(*) AS * values(ip) AS ip BY dest \
| fillnull value=0
iseval = 0
